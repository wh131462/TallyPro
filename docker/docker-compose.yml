services:
  # ---- MySQL ----
  mysql:
    image: mysql:8.0
    container_name: tally-pro-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-tally_pro_root}
      MYSQL_DATABASE: ${DB_NAME:-tally_pro}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

  # ---- API Server ----
  server:
    image: ghcr.io/wh131462/tallypro-server:latest
    container_name: tally-pro-server
    restart: unless-stopped
    env_file:
      - ../configs/.env.production
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
    volumes:
      - uploads_data:/app/packages/server/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - internal
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.tally-api.rule=Host(`tally-api.131462.wang`)
      - traefik.http.routers.tally-api.entrypoints=websecure
      - traefik.http.routers.tally-api.tls.certresolver=letsencrypt
      - traefik.http.services.tally-api.loadbalancer.server.port=8866

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local

networks:
  internal:
    driver: bridge
  proxy:
    external: true
