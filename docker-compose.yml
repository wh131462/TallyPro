version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tally-pro-mysql
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: tally_pro_root
      MYSQL_DATABASE: tally_pro
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-ptally_pro_root']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tally-pro-network

  redis:
    image: redis:7-alpine
    container_name: tally-pro-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - tally-pro-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  tally-pro-network:
    driver: bridge
